name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# This workflow is the build/lint gate for pushes and pull requests. Building
# and deploying the blueprint + documentation to GitHub Pages is handled
# exclusively by `blueprint.yml` (on pushes to `main`). This workflow must NOT
# produce a `github-pages` artifact or deploy Pages, otherwise two such
# artifacts collide in a single run and `actions/deploy-pages` fails.
permissions:
  contents: read # Read access to repository contents

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          build: true
          lint: true
          mk_all-check: true
